<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisão de Plano de Saúde - Scozziero Advocacia</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #F0F4F8;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #1B3A5C, #0d2440);
      color: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .container {
      max-width: 1400px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
      flex-wrap: wrap;
    }

    .tab-button {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.3s ease;
    }

    .tab-button.active {
      color: #1B3A5C;
      border-bottom-color: #C8A96E;
    }

    .tab-button:hover {
      color: #1B3A5C;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .kpi-card {
      background: white;
      border-left: 4px solid;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .kpi-card.green {
      border-left-color: #27AE60;
    }

    .kpi-card.orange {
      border-left-color: #F39C12;
    }

    .kpi-card.blue {
      border-left-color: #3498DB;
    }

    .kpi-card.purple {
      border-left-color: #9B59B6;
    }

    .kpi-card.gray {
      border-left-color: #95A5A6;
    }

    .kpi-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: bold;
      color: #1B3A5C;
    }

    .kpi-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
    }

    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .chart-container h3 {
      margin-bottom: 15px;
      color: #1B3A5C;
      font-size: 16px;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .section h2 {
      color: #1B3A5C;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #C8A96E;
      background: #FFFEF5;
    }

    button {
      padding: 10px 20px;
      background: #1B3A5C;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #0d2440;
    }

    button.secondary {
      background: #95A5A6;
    }

    button.secondary:hover {
      background: #7F8C8D;
    }

    button.danger {
      background: #E74C3C;
    }

    button.danger:hover {
      background: #C0392B;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table thead {
      background: #F8F9FA;
      position: sticky;
      top: 0;
    }

    .table th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #1B3A5C;
      border-bottom: 2px solid #ddd;
    }

    .table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .table tbody tr:nth-child(even) {
      background: #F8F9FA;
    }

    .table tbody tr:hover {
      background: #E8EAED;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge.excesso {
      background: #FADBD8;
      color: #C0392B;
    }

    .badge.prescrito {
      background: #D5DBDB;
      color: #566573;
    }

    .badge.ok {
      background: #D5F4E6;
      color: #27AE60;
    }

    .config-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .sub-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      border-bottom: 1px solid #ddd;
    }

    .sub-tab-button {
      padding: 10px 15px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      transition: all 0.3s ease;
    }

    .sub-tab-button.active {
      color: #1B3A5C;
      border-bottom-color: #C8A96E;
    }

    .sub-tab-content {
      display: none;
    }

    .sub-tab-content.active {
      display: block;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .text-right {
      text-align: right;
    }

    .text-center {
      text-align: center;
    }

    @media (max-width: 1024px) {
      .chart-grid {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
    }
  </style>
</head>

  const [configDataInicio, setConfigDataInicio] = React.useState('2000-01-01');
  const [configCnpjFilter, setConfigCnpjFilter] = React.useState('');
  const [resultadosTab, setResultadosTab] = React.useState('segurado');

  // GitHub integration state
  const GH_OWNER = 'gnscozziero-lang';
  const GH_REPO = 'calculadora-plano-saude';
  const [ghToken, setGhToken] = React.useState('');
  const [ghStatus, setGhStatus] = React.useState('');
  const [ghSaving, setGhSaving] = React.useState(false);
  const [ghLoading, setGhLoading] = React.useState(false);
  const [ghCasoNome, setGhCasoNome] = React.useState('');
  const [ghCasos, setGhCasos] = React.useState([]);
  const [ghHistorico, setGhHistorico] = React.useState(null);

  // GitHub helper functions
  const toBase64 = (str) => btoa(unescape(encodeURIComponent(str)));
  const ghHdrs = () => ({ 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' });

  const ghListCasos = async () => {
    if (!ghToken) { setGhStatus('❌ Informe o token GitHub primeiro'); return; }
    setGhLoading(true); setGhStatus('🔍 Buscando casos...');
    try {
      const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/casos`, { headers: ghHdrs() });
      if (res.status === 404) { setGhCasos([]); setGhStatus('📂 Nenhum caso salvo ainda'); }
      else if (res.ok) {
        const files = await res.json();
        const arr = Array.isArray(files) ? files.filter(f => f.name.endsWith('.json')) : [];
        setGhCasos(arr);
        setGhStatus(`✅ ${arr.length} caso(s) encontrado(s)`);
      } else { const e = await res.json(); setGhStatus(`❌ ${e.message}`); }
    } catch(e) { setGhStatus(`❌ Erro de rede: ${e.message}`); }
    setGhLoading(false);
  };

  const ghSalvar = async () => {
    if (!ghToken) { setGhStatus('❌ Informe o token GitHub'); return; }
    if (!ghCasoNome.trim()) { setGhStatus('❌ Informe um nome para o caso'); return; }
    setGhSaving(true); setGhStatus('💾 Salvando...');
    const nome = ghCasoNome.trim().replace(/[^\w\s\-]/g, '').replace(/\s+/g, '_');
    const path = `casos/${nome}.json`;
    const payload = {
      metadados: { nome: ghCasoNome.trim(), salvoEm: new Date().toISOString(), versao: '1.0' },
      cnpjs, beneficiarios, reajustes,
      config: { indexador: configIndexador, juros: configJuros, refMes: configRefMes, dataInicio: configDataInicio }
    };
    try {
      const checkRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, { headers: ghHdrs() });
      const body = { message: `Salvo: ${ghCasoNome} — ${new Date().toLocaleString('pt-BR')}`, content: toBase64(JSON.stringify(payload, null, 2)) };
      if (checkRes.ok) { const ex = await checkRes.json(); body.sha = ex.sha; }
      const saveRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, { method: 'PUT', headers: ghHdrs(), body: JSON.stringify(body) });
      if (saveRes.ok) { setGhStatus(`✅ Salvo com sucesso: "${ghCasoNome}"`); ghListCasos(); }
      else { const e = await saveRes.json(); setGhStatus(`❌ Erro ao salvar: ${e.message}`); }
    } catch(e) { setGhStatus(`❌ ${e.message}`); }
    setGhSaving(false);
  };

  const ghCarregar = async (file) => {
    if (!window.confirm(`Carregar o caso "${file.name.replace('.json','')}"? Os dados atuais serão substituídos.`)) return;
    setGhLoading(true); setGhStatus(`📂 Carregando...`);
    try {
      const res = await fetch(file.download_url + '?t=' + Date.now());
      if (res.ok) {
        const data = await res.json();
        setCnjps(data.cnpjs || []); setBeneficiarios(data.beneficiarios || []); setReajustes(data.reajustes || []);
        if (data.config) { setConfigIndexador(data.config.indexador||'ca'); setConfigJuros(data.config.juros||'hybrid'); setConfigRefMes(data.config.refMes||'2026-02'); setConfigDataInicio(data.config.dataInicio||'2000-01-01'); }
        setGhCasoNome(data.metadados?.nome || file.name.replace('.json',''));
        setGhStatus(`✅ Caso carregado: "${data.metadados?.nome || file.name}"`);
        setActiveTab('dashboard');
      } else { setGhStatus('❌ Erro ao carregar o arquivo'); }
    } catch(e) { setGhStatus(`❌ ${e.message}`); }
    setGhLoading(false);
  };

  const ghVerHistorico = async (filePath) => {
    setGhLoading(true); setGhStatus('🕐 Carregando histórico...');
    try {
      const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/commits?path=${filePath}&per_page=30`, { headers: ghHdrs() });
      if (res.ok) { const commits = await res.json(); setGhHistorico({ path: filePath, commits }); setGhStatus(''); }
      else { setGhStatus('❌ Erro ao buscar histórico'); }
    } catch(e) { setGhStatus(`❌ ${e.message}`); }
    setGhLoading(false);
  };

  const chartEvolucao = React.useRef(null);
  const chartReajuste = React.useRef(null);
  const chartComposicao = React.useRef(null);
  const chartRanking = React.useRef(null);
  const chartsInstances = React.useRef({});

  const addCnpj = () => {
    if (!formCnpj.cnpj.trim()) return;
    setCnjps([...cnjps, { id: Date.now(), ...formCnpj }]);
    setFormCnpj({ cnpj: '', empresa: '', operadora: '', nrContrato: '' });
  };

  const deleteCnpj = (id) => {
    setCnjps(cnjps.filter(c => c.id !== id));
  };

  const addBeneficiario = () => {
    if (!formBeneficiario.cnpjId || !formBeneficiario.nome.trim()) return;
    setBeneficiarios([...beneficiarios, { id: Date.now(), ...formBeneficiario }]);
    setFormBeneficiario({ cnpjId: '', nome: '', cpf: '', dataNascimento: '', dataAdesao: '', numeroCarteirinha: '' });
  };

  const deleteBeneficiario = (id) => {
    setBeneficiarios(beneficiarios.filter(b => b.id !== id));
  };

  const addReajuste = () => {
    if (!formReajuste.beneficiarioId || !formReajuste.mesAno) return;
    setReajustes([...reajustes, { id: Date.now(), ...formReajuste }]);
    setFormReajuste({ beneficiarioId: '', mesAno: '', valorPago: '', reajusteAplicado: '', reajusteNegativo: '', mudancaIdade: '', observacao: '' });
  };

  const deleteReajuste = (id) => {
    setReajustes(reajustes.filter(r => r.id !== id));
  };

  const calcularResultados = React.useMemo(() => {
    return () => {
      let todosPorSeguro = [];
      let todosPorCNPJ = {};

      beneficiarios.forEach(ben => {
        const cnpj = cnjps.find(c => c.id === parseInt(ben.cnpjId));
        if (!cnpj) return;

        const reajustesBen = reajustes
          .filter(r => r.beneficiarioId === ben.id.toString())
          .sort((a, b) => a.mesAno.localeCompare(b.mesAno));

        let valorAnterior = 0;
        reajustesBen.forEach((rej, idx) => {
          const mesAno = rej.mesAno;
          const valorPago = parseFloat(rej.valorPago) || 0;
          const reajusteAplicado = parseFloat(rej.reajusteAplicado);
          const reajusteNegativo = (parseFloat(rej.reajusteNegativo) || 0) / 100;
          const mudancaIdade = (parseFloat(rej.mudancaIdade) || 0) / 100;

          let valorDevido;
          if (idx === 0) {
            valorDevido = valorPago;
          } else {
            const ansRate = INDICES[mesAno]?.an || 0;  // already decimal e.g. 0.0814
            const hasReajuste = rej.reajusteAplicado !== '' && rej.reajusteAplicado != null && !isNaN(reajusteAplicado);
            const applied = hasReajuste ? reajusteAplicado / 100 : null;

            if (applied !== null) {
              if (applied < 0) {
                valorDevido = valorAnterior * (1 + ansRate) * (1 + reajusteNegativo) * (1 + mudancaIdade);
              } else {
                const minAdjust = Math.min(applied, ansRate);
                valorDevido = valorAnterior * (1 + minAdjust) * (1 + reajusteNegativo) * (1 + mudancaIdade);
              }
            } else {
              // No reajuste this month — value carries forward with only age/neg adjustments
              valorDevido = valorAnterior * (1 + reajusteNegativo) * (1 + mudancaIdade);
            }
          }

          const dataInicioCobr = new Date(configDataInicio);
          const mesAnoDate = new Date(mesAno + '-01');
          const diferenca = mesAnoDate >= dataInicioCobr ? Math.max(0, valorPago - valorDevido) : 0;

          const refDate = new Date(configRefMes + '-01');
          const daysDiff = (refDate - new Date(mesAno + '-01')) / (1000 * 60 * 60 * 24);
          const years = Math.floor(daysDiff) / 365.25;
          const prescrito = years >= 3;

          let fatorCorrecao = 1.0;
          if (configIndexador !== 'sem') {
            // ca/ia/fa are accumulated factors FROM that month TO end of table.
            // Factor from mesAno to refMes = INDICES[mesAno][key] / INDICES[refMes][key]
            const correcaoMes = INDICES[mesAno]?.[configIndexador];
            const correcaoRef = INDICES[configRefMes]?.[configIndexador];
            if (correcaoRef && correcaoMes) {
              fatorCorrecao = correcaoMes / correcaoRef;
            }
          }

          let jurosPercent = 0;
          if (configJuros !== 'sem') {
            const selicRef = INDICES[configRefMes]?.sa || 1;
            const selicMes = INDICES[mesAno]?.sa || 1;
            const selicAccum = selicRef / selicMes - 1;

            if (configJuros === 'selic') {
              jurosPercent = Math.max(0, selicAccum);
            } else {
              const AUG_2024 = '2024-08';
              if (mesAno <= AUG_2024) {
                const diffMeses = (new Date(AUG_2024).getFullYear() - new Date(mesAno).getFullYear()) * 12 +
                                  (new Date(AUG_2024).getMonth() - new Date(mesAno).getMonth());
                jurosPercent = 0.01 * (diffMeses + 1) + selicAccum;
              } else {
                jurosPercent = Math.max(0, selicAccum);
              }
            }
          }

          const totalAtualizado = prescrito ? 0 : diferenca * fatorCorrecao * (1 + jurosPercent);

          const row = {
            mesAno,
            valorPago,
            valorDevido: parseFloat(valorDevido.toFixed(2)),
            diferenca: parseFloat(diferenca.toFixed(2)),
            prescrito,
            fatorCorrecao: parseFloat(fatorCorrecao.toFixed(6)),
            jurosPercent,
            totalAtualizado: parseFloat(totalAtualizado.toFixed(2)),
            beneficiario: ben.nome,
            cnpj: cnpj.cnpj,
            cnpjId: cnpj.id
          };

          todosPorSeguro.push(row);
          valorAnterior = valorDevido;

          if (!todosPorCNPJ[cnpj.id]) {
            todosPorCNPJ[cnpj.id] = { cnpj: cnpj.cnpj, empresa: cnpj.empresa, rows: [] };
          }
          todosPorCNPJ[cnpj.id].rows.push(row);
        });
      });

      return { todosPorSeguro, todosPorCNPJ };
    };
  }, [beneficiarios, reajustes, cnjps, configIndexador, configJuros, configRefMes, configDataInicio]);

  const resultados = calcularResultados();

  const metricas = React.useMemo(() => {
    let totalRestituir = 0, excesso = 0, correcao = 0, juros = 0, prescrito = 0;
    resultados.todosPorSeguro.forEach(row => {
      if (!row.prescrito) {
        totalRestituir += row.totalAtualizado;
        excesso += row.diferenca;
        correcao += row.diferenca * (row.fatorCorrecao - 1);
        juros += row.diferenca * row.fatorCorrecao * row.jurosPercent;
      } else {
        prescrito += row.diferenca;
      }
    });
    return { totalRestituir: parseFloat(totalRestituir.toFixed(2)), excesso: parseFloat(excesso.toFixed(2)), correcao: parseFloat(correcao.toFixed(2)), juros: parseFloat(juros.toFixed(2)), prescrito: parseFloat(prescrito.toFixed(2)) };
  }, [resultados]);

  React.useEffect(() => {
    if (activeTab === 'dashboard') {
      setTimeout(() => renderCharts(), 100);
    }
  }, [activeTab, resultados]);

  const renderCharts = () => {
    Object.keys(chartsInstances.current).forEach(key => {
      if (chartsInstances.current[key]) chartsInstances.current[key].destroy();
    });
    chartsInstances.current = {};

    const agrupado = {};
    resultados.todosPorSeguro.forEach(row => {
      if (!agrupado[row.mesAno]) agrupado[row.mesAno] = { valorPago: 0, valorDevido: 0, diferenca: 0 };
      agrupado[row.mesAno].valorPago += row.valorPago;
      agrupado[row.mesAno].valorDevido += row.valorDevido;
      agrupado[row.mesAno].diferenca += row.diferenca;
    });

    const meses = Object.keys(agrupado).sort();
    if (chartEvolucao.current && meses.length > 0) {
      const ctxEvol = chartEvolucao.current.getContext('2d');
      chartsInstances.current.evolucao = new Chart(ctxEvol, {
        type: 'bar',
        data: {
          labels: meses,
          datasets: [
            { label: 'Valor Pago', type: 'line', data: meses.map(m => agrupado[m].valorPago), borderColor: '#1B3A5C', tension: 0.4, fill: false },
            { label: 'Valor Devido', type: 'line', data: meses.map(m => agrupado[m].valorDevido), borderColor: '#C8A96E', tension: 0.4, fill: false },
            { label: 'Diferença', type: 'bar', data: meses.map(m => agrupado[m].diferenca), backgroundColor: '#F39C12', borderColor: '#E67E22', borderRadius: 4 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
      });
    }

    if (chartComposicao.current) {
      const ctxComp = chartComposicao.current.getContext('2d');
      chartsInstances.current.composicao = new Chart(ctxComp, {
        type: 'doughnut',
        data: {
          labels: ['Excesso Bruto', 'Correção', 'Juros', 'Prescrito'],
          datasets: [{
            data: [metricas.excesso, metricas.correcao, metricas.juros, metricas.prescrito],
            backgroundColor: ['#F39C12', '#3498DB', '#9B59B6', '#95A5A6']
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }
  };

  const handleCsvImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        const novosReajustes = results.data.map(row => ({
          id: Date.now() + Math.random(),
          beneficiarioId: row.beneficiarioId,
          mesAno: row.mesAno,
          valorPago: row.valorPago,
          reajusteAplicado: row.reajusteAplicado,
          reajusteNegativo: row.reajusteNegativo || '',
          mudancaIdade: row.mudancaIdade || '',
          observacao: row.observacao || ''
        }));
        setReajustes([...reajustes, ...novosReajustes]);
      }
    });
  };

  const exportCsv = () => {
    const csv = [['Mês', 'Beneficiário', 'CNPJ', 'Valor Pago', 'Valor Devido', 'Diferença', 'Prescrito', 'Fator Correção', 'Juros %', 'Total Atualizado']];
    resultados.todosPorSeguro.forEach(row => {
      csv.push([row.mesAno, row.beneficiario, row.cnpj, row.valorPago, row.valorDevido, row.diferenca, row.prescrito ? 'Sim' : 'Não', row.fatorCorrecao, (row.jurosPercent * 100).toFixed(2), row.totalAtualizado]);
    });
    const content = csv.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
    const link = document.createElement('a');
    link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(content);
    link.download = 'resultados.csv';
    link.click();
  };

  const filteredResults = configCnpjFilter
    ? resultados.todosPorSeguro.filter(r => r.cnpjId === parseInt(configCnpjFilter))
    : resultados.todosPorSeguro;

  return (
    <div>
      <header style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 40px'}}>
        <div>
          <h1 style={{marginBottom:'2px'}}>Revisão de Plano de Saúde</h1>
          <p style={{margin:0}}>Scozziero Advocacia — Falso Coletivo (ANS)</p>
        </div>
        <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
          {ghToken && ghCasoNome && (
            <button onClick={ghSalvar} disabled={ghSaving} style={{background:'#C8A96E',color:'#1B3A5C',border:'none',padding:'8px 18px',borderRadius:'6px',fontWeight:'700',cursor:'pointer',fontSize:'14px'}}>
              {ghSaving ? '⏳ Salvando...' : '💾 Salvar'}
            </button>
          )}
          <button onClick={() => setActiveTab('github')} style={{background:'rgba(255,255,255,0.15)',color:'white',border:'1px solid rgba(255,255,255,0.3)',padding:'8px 18px',borderRadius:'6px',cursor:'pointer',fontSize:'14px'}}>
            ☁️ GitHub
          </button>
        </div>
      </header>
      <div className="container">
        <div className="tabs">
          {['dashboard', 'cadastro', 'reajustes', 'resultados', 'indices', 'github'].map(tab => (
            <button key={tab} className={`tab-button ${activeTab === tab ? 'active' : ''}`} onClick={() => setActiveTab(tab)}>
              {tab === 'dashboard' ? '📊 Dashboard' : tab === 'cadastro' ? '👥 Cadastro' : tab === 'reajustes' ? '📅 Reajustes' : tab === 'resultados' ? '📋 Resultados' : tab === 'indices' ? '📈 Índices ANS' : '☁️ GitHub'}
            </button>
          ))}
        </div>

        {activeTab === 'dashboard' && (
          <div className="tab-content active">
            <div className="kpi-grid">
              <div className="kpi-card green">
                <div className="kpi-icon">💰</div>
                <div className="kpi-label">Total a Restituir</div>
                <div className="kpi-value">R$ {metricas.totalRestituir.toLocaleString('pt-BR', { maximumFractionDigits: 2 })}</div>
                <div className="info-text">Repetição Indébito: R$ {(metricas.totalRestituir * 2).toLocaleString('pt-BR', { maximumFractionDigits: 2 })}</div>
              </div>
              <div className="kpi-card orange">
                <div className="kpi-icon">📊</div>
                <div className="kpi-label">Excesso Bruto</div>
                <div className="kpi-value">R$ {metricas.excesso.toLocaleString('pt-BR', { maximumFractionDigits: 2 })}</div>
                <div className="info-text">{beneficiarios.length} Segurados</div>
              </div>
              <div className="kpi-card blue">
                <div className="kpi-icon">📈</div>
                <div className="kpi-label">Correção Monetária</div>
                <div className="kpi-value">R$ {metricas.correcao.toLocaleString('pt-BR', { maximumFractionDigits: 2 })}</div>
                <div className="info-text">{cnjps.length} CNPJs</div>
              </div>
              <div className="kpi-card purple">
                <div className="kpi-icon">💳</div>
                <div className="kpi-label">Juros de Mora</div>
                <div className="kpi-value">R$ {metricas.juros.toLocaleString('pt-BR', { maximumFractionDigits: 2 })}</div>
              </div>
              <div className="kpi-card gray">
                <div className="kpi-icon">🔒</div>
                <div className="kpi-label">Prescrito</div>
                <div className="kpi-value">R$ {metricas.prescrito.toLocaleString('pt-BR', { maximumFractionDigits: 2 })}</div>
              </div>
            </div>
            <div className="chart-grid">
              <div className="chart-container">
                <h3>Evolução Mensal</h3>
                <canvas ref={chartEvolucao} style={{ height: '300px' }}></canvas>
              </div>
              <div className="chart-container">
                <h3>Composição do Crédito</h3>
                <canvas ref={chartComposicao} style={{ height: '300px' }}></canvas>
              </div>
            </div>
          </div>
        )}

        {activeTab === 'cadastro' && (
          <div className="tab-content active">
            <div className="section">
              <h2>Seção A: Cadastro de CNPJ</h2>
              <div className="form-row">
                <div className="form-group">
                  <label>CNPJ</label>
                  <input type="text" value={formCnpj.cnpj} onChange={(e) => setFormCnpj({...formCnpj, cnpj: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Razão Social</label>
                  <input type="text" value={formCnpj.empresa} onChange={(e) => setFormCnpj({...formCnpj, empresa: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Operadora</label>
                  <input type="text" value={formCnpj.operadora} onChange={(e) => setFormCnpj({...formCnpj, operadora: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Número Contrato</label>
                  <input type="text" value={formCnpj.nrContrato} onChange={(e) => setFormCnpj({...formCnpj, nrContrato: e.target.value})} />
                </div>
              </div>
              <button onClick={addCnpj}>+ Adicionar CNPJ</button>
              {cnjps.length > 0 && (
                <table className="table" style={{marginTop: '20px'}}>
                  <thead>
                    <tr><th>CNPJ</th><th>Empresa</th><th>Operadora</th><th>Contrato</th><th>Ação</th></tr>
                  </thead>
                  <tbody>
                    {cnjps.map(c => <tr key={c.id}><td>{c.cnpj}</td><td>{c.empresa}</td><td>{c.operadora}</td><td>{c.nrContrato}</td><td><button className="danger" onClick={() => deleteCnpj(c.id)}>Deletar</button></td></tr>)}
                  </tbody>
                </table>
              )}
            </div>

            <div className="section">
              <h2>Seção B: Cadastro de Beneficiário</h2>
              <div className="form-row">
                <div className="form-group">
                  <label>CNPJ</label>
                  <select value={formBeneficiario.cnpjId} onChange={(e) => setFormBeneficiario({...formBeneficiario, cnpjId: e.target.value})}>
                    <option value="">Selecione...</option>
                    {cnjps.map(c => <option key={c.id} value={c.id}>{c.cnpj} - {c.empresa}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Nome</label>
                  <input type="text" value={formBeneficiario.nome} onChange={(e) => setFormBeneficiario({...formBeneficiario, nome: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>CPF</label>
                  <input type="text" value={formBeneficiario.cpf} onChange={(e) => setFormBeneficiario({...formBeneficiario, cpf: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Data Nascimento</label>
                  <input type="date" value={formBeneficiario.dataNascimento} onChange={(e) => setFormBeneficiario({...formBeneficiario, dataNascimento: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Data Adesão</label>
                  <input type="date" value={formBeneficiario.dataAdesao} onChange={(e) => setFormBeneficiario({...formBeneficiario, dataAdesao: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Carteirinha</label>
                  <input type="text" value={formBeneficiario.numeroCarteirinha} onChange={(e) => setFormBeneficiario({...formBeneficiario, numeroCarteirinha: e.target.value})} />
                </div>
              </div>
              <button onClick={addBeneficiario}>+ Adicionar Beneficiário</button>
              {beneficiarios.length > 0 && (
                <table className="table" style={{marginTop: '20px'}}>
                  <thead>
                    <tr><th>Nome</th><th>CPF</th><th>Carteirinha</th><th>Ação</th></tr>
                  </thead>
                  <tbody>
                    {beneficiarios.map(b => <tr key={b.id}><td>{b.nome}</td><td>{b.cpf}</td><td>{b.numeroCarteirinha}</td><td><button className="danger" onClick={() => deleteBeneficiario(b.id)}>Deletar</button></td></tr>)}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}

        {activeTab === 'reajustes' && (
          <div className="tab-content active">
            <div className="section">
              <h2>Lançamento de Reajustes</h2>
              <div className="form-row">
                <div className="form-group">
                  <label>Beneficiário</label>
                  <select value={formReajuste.beneficiarioId} onChange={(e) => setFormReajuste({...formReajuste, beneficiarioId: e.target.value})}>
                    <option value="">Selecione...</option>
                    {cnjps.map(cnpj => (
                      <optgroup key={cnpj.id} label={cnpj.cnpj}>
                        {beneficiarios.filter(b => b.cnpjId === cnpj.id.toString()).map(b => <option key={b.id} value={b.id}>{b.nome}</option>)}
                      </optgroup>
                    ))}
                  </select>
                </div>
                <div className="form-group">
                  <label>Mês/Ano (YYYY-MM)</label>
                  <input type="text" placeholder="2026-02" value={formReajuste.mesAno} onChange={(e) => setFormReajuste({...formReajuste, mesAno: e.target.value})} />
                  {INDICES[formReajuste.mesAno] && <div className="info-text">ANS: {(INDICES[formReajuste.mesAno].an * 100).toFixed(2)}%</div>}
                </div>
                <div className="form-group">
                  <label>Valor Pago (R$)</label>
                  <input type="number" step="0.01" value={formReajuste.valorPago} onChange={(e) => setFormReajuste({...formReajuste, valorPago: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Reajuste Aplicado (%)</label>
                  <input type="number" step="0.01" value={formReajuste.reajusteAplicado} onChange={(e) => setFormReajuste({...formReajuste, reajusteAplicado: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Reajuste Negativo (%)</label>
                  <input type="number" step="0.01" value={formReajuste.reajusteNegativo} onChange={(e) => setFormReajuste({...formReajuste, reajusteNegativo: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Mudança Idade (%)</label>
                  <input type="number" step="0.01" value={formReajuste.mudancaIdade} onChange={(e) => setFormReajuste({...formReajuste, mudancaIdade: e.target.value})} />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group" style={{gridColumn: '1 / -1'}}>
                  <label>Observação</label>
                  <textarea value={formReajuste.observacao} onChange={(e) => setFormReajuste({...formReajuste, observacao: e.target.value})} style={{minHeight: '60px'}}></textarea>
                </div>
              </div>
              <div className="button-group">
                <button onClick={addReajuste}>+ Adicionar Reajuste</button>
                <label style={{display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer'}}>
                  <button className="secondary">Importar CSV</button>
                  <input type="file" accept=".csv" onChange={handleCsvImport} style={{display: 'none'}} />
                </label>
              </div>

              {reajustes.length > 0 && (
                <div style={{marginTop: '30px'}}>
                  <h3>Reajustes Lançados ({reajustes.length})</h3>
                  <table className="table">
                    <thead>
                      <tr><th>Beneficiário</th><th>Mês</th><th>Valor Pago</th><th>Reajuste %</th><th>Ação</th></tr>
                    </thead>
                    <tbody>
                      {reajustes.sort((a,b) => a.mesAno.localeCompare(b.mesAno)).map(r => {
                        const ben = beneficiarios.find(b => b.id.toString() === r.beneficiarioId);
                        return <tr key={r.id}><td>{ben?.nome || 'N/A'}</td><td>{r.mesAno}</td><td>R$ {parseFloat(r.valorPago).toFixed(2)}</td><td>{r.reajusteAplicado}%</td><td><button className="danger" onClick={() => deleteReajuste(r.id)}>Deletar</button></td></tr>
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        )}

        {activeTab === 'resultados' && (
          <div className="tab-content active">
            <div className="section">
              <h2>Configurações</h2>
              <div className="config-bar">
                <div className="form-group">
                  <label>Indexador</label>
                  <select value={configIndexador} onChange={(e) => setConfigIndexador(e.target.value)}>
                    <option value="ca">IPCA</option>
                    <option value="ia">INPC</option>
                    <option value="fa">FIPE</option>
                    <option value="sem">Sem correção</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>Juros</label>
                  <select value={configJuros} onChange={(e) => setConfigJuros(e.target.value)}>
                    <option value="hybrid">1% até ago/2024 + SELIC</option>
                    <option value="selic">Apenas SELIC</option>
                    <option value="sem">Sem juros</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>Data Referência</label>
                  <input type="text" placeholder="YYYY-MM" value={configRefMes} onChange={(e) => setConfigRefMes(e.target.value)} />
                </div>
                <div className="form-group">
                  <label>Data Início Cobrança</label>
                  <input type="date" value={configDataInicio} onChange={(e) => setConfigDataInicio(e.target.value)} />
                </div>
                <div className="form-group">
                  <label>CNPJ</label>
                  <select value={configCnpjFilter} onChange={(e) => setConfigCnpjFilter(e.target.value)}>
                    <option value="">Todos</option>
                    {cnjps.map(c => <option key={c.id} value={c.id}>{c.cnpj}</option>)}
                  </select>
                </div>
              </div>
            </div>

            <div className="sub-tabs">
              <button className={`sub-tab-button ${resultadosTab === 'segurado' ? 'active' : ''}`} onClick={() => setResultadosTab('segurado')}>Por Segurado</button>
              <button className={`sub-tab-button ${resultadosTab === 'cnpj' ? 'active' : ''}`} onClick={() => setResultadosTab('cnpj')}>Por CNPJ</button>
            </div>

            {resultadosTab === 'segurado' && (
              <div className="sub-tab-content active">
                <div className="section">
                  <div style={{marginBottom: '15px'}}><button onClick={exportCsv}>Exportar CSV</button></div>
                  {filteredResults.length > 0 ? (
                    <table className="table">
                      <thead>
                        <tr><th>Mês</th><th>Beneficiário</th><th>Valor Pago</th><th>Valor Devido</th><th>Diferença</th><th>Prescrito</th><th>Fator Correção</th><th>Juros %</th><th>Total</th></tr>
                      </thead>
                      <tbody>
                        {filteredResults.map((row, idx) => {
                          const status = row.prescrito ? 'prescrito' : row.diferenca > 0 ? 'excesso' : 'ok';
                          return (
                            <tr key={idx} style={{backgroundColor: status === 'prescrito' ? '#E8DAEF' : status === 'excesso' ? '#FADBD8' : 'inherit'}}>
                              <td>{row.mesAno}</td>
                              <td>{row.beneficiario}</td>
                              <td className="text-right">R$ {row.valorPago.toFixed(2)}</td>
                              <td className="text-right">R$ {row.valorDevido.toFixed(2)}</td>
                              <td className="text-right"><span className={`badge ${status}`}>{status === 'prescrito' ? 'Prescrito' : status === 'excesso' ? 'Excesso' : 'OK'}</span></td>
                              <td className="text-center">{row.prescrito ? 'Sim' : 'Não'}</td>
                              <td className="text-right">{row.fatorCorrecao.toFixed(6)}</td>
                              <td className="text-right">{(row.jurosPercent * 100).toFixed(2)}%</td>
                              <td className="text-right"><strong>R$ {row.totalAtualizado.toFixed(2)}</strong></td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  ) : <p style={{padding: '20px', textAlign: 'center', color: '#999'}}>Nenhum resultado encontrado. Cadastre reajustes para ver os cálculos.</p>}
                </div>
              </div>
            )}

            {resultadosTab === 'cnpj' && (
              <div className="sub-tab-content active">
                <div className="section">
                  {Object.values(resultados.todosPorCNPJ).length > 0 ? (
                    <table className="table">
                      <thead>
                        <tr><th>CNPJ</th><th>Empresa</th><th>Total Excesso</th><th>Total Atualizado</th></tr>
                      </thead>
                      <tbody>
                        {Object.values(resultados.todosPorCNPJ).map((cnpjData, idx) => {
                          const totalExcesso = cnpjData.rows.reduce((sum, r) => sum + r.diferenca, 0);
                          const totalAtualizado = cnpjData.rows.reduce((sum, r) => sum + r.totalAtualizado, 0);
                          return (
                            <tr key={idx}><td>{cnpjData.cnpj}</td><td>{cnpjData.empresa}</td><td className="text-right">R$ {totalExcesso.toFixed(2)}</td><td className="text-right"><strong>R$ {totalAtualizado.toFixed(2)}</strong></td></tr>
                          );
                        })}
                      </tbody>
                    </table>
                  ) : <p style={{padding: '20px', textAlign: 'center', color: '#999'}}>Nenhum resultado encontrado.</p>}
                </div>
              </div>
            )}
          </div>
        )}

        {activeTab === 'github' && (
          <div className="tab-content active">
            <div className="section">
              <h2>☁️ GitHub — Persistência de Casos</h2>
              <p style={{color:'#666',marginBottom:'16px'}}>Repositório: <strong>gnscozziero-lang/calculadora-plano-saude</strong></p>
              <div style={{background:'#f0f4f8',border:'1px solid #dce1e7',borderRadius:'8px',padding:'16px',marginBottom:'20px'}}>
                <label style={{display:'block',fontWeight:'600',marginBottom:'6px'}}>🔑 Personal Access Token (PAT)</label>
                <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                  <input type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value={ghToken} onChange={e => { setGhToken(e.target.value); setGhStatus(''); }} style={{flex:1,padding:'10px',borderRadius:'6px',border:'1px solid #ccc',fontSize:'14px'}} />
                  <button onClick={ghListCasos} disabled={ghLoading} style={{background:'#1B3A5C',color:'white',border:'none',padding:'10px 20px',borderRadius:'6px',cursor:'pointer',fontWeight:'600',whiteSpace:'nowrap'}}>
                    {ghLoading ? '⏳ Aguarde...' : '🔍 Listar Casos'}
                  </button>
                </div>
                <small style={{color:'#888',marginTop:'6px',display:'block'}}>Token com escopo <strong>repo</strong>. Crie em: github.com/settings/tokens/new</small>
              </div>
              {ghStatus && <div style={{padding:'10px 14px',borderRadius:'6px',background: ghStatus.startsWith('✅') ? '#d4edda' : ghStatus.startsWith('❌') ? '#f8d7da' : '#fff3cd',color: ghStatus.startsWith('✅') ? '#155724' : ghStatus.startsWith('❌') ? '#721c24' : '#856404',marginBottom:'16px',fontWeight:'500'}}>{ghStatus}</div>}
            </div>

            <div className="section">
              <h3>💾 Salvar Caso Atual</h3>
              <div style={{display:'flex',gap:'12px',alignItems:'flex-end',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:'250px'}}>
                  <label style={{display:'block',fontWeight:'600',marginBottom:'6px'}}>Nome do Caso</label>
                  <input placeholder="ex: Fulano vs Amil — 2024" value={ghCasoNome} onChange={e => setGhCasoNome(e.target.value)} style={{width:'100%',padding:'10px',borderRadius:'6px',border:'1px solid #ccc',fontSize:'14px'}} />
                </div>
                <button onClick={ghSalvar} disabled={ghSaving || !ghToken} style={{background:'#C8A96E',color:'#1B3A5C',border:'none',padding:'10px 24px',borderRadius:'6px',cursor:'pointer',fontWeight:'700',fontSize:'15px',height:'42px'}}>
                  {ghSaving ? '⏳ Salvando...' : '💾 Salvar no GitHub'}
                </button>
              </div>
              <small style={{color:'#888',marginTop:'8px',display:'block'}}>Cada salvamento cria uma nova versão automática. O histórico completo fica gravado no GitHub.</small>
            </div>

            {ghCasos.length > 0 && (
              <div className="section">
                <h3>📂 Casos Salvos ({ghCasos.length})</h3>
                <table className="table">
                  <thead><tr><th>Nome do Caso</th><th style={{width:'200px',textAlign:'center'}}>Ações</th></tr></thead>
                  <tbody>
                    {ghCasos.map(f => (
                      <tr key={f.sha}>
                        <td style={{fontWeight:'500'}}>📄 {f.name.replace('.json','').replace(/_/g,' ')}</td>
                        <td style={{textAlign:'center'}}>
                          <button onClick={() => ghCarregar(f)} style={{background:'#1B3A5C',color:'white',border:'none',padding:'6px 14px',borderRadius:'5px',cursor:'pointer',marginRight:'8px',fontSize:'13px'}}>📂 Carregar</button>
                          <button onClick={() => ghVerHistorico(f.path)} style={{background:'#6c757d',color:'white',border:'none',padding:'6px 14px',borderRadius:'5px',cursor:'pointer',fontSize:'13px'}}>🕐 Versões</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {ghHistorico && (
              <div className="section">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                  <h3 style={{margin:0}}>🕐 Histórico de Versões — {ghHistorico.path.replace('casos/','').replace('.json','').replace(/_/g,' ')}</h3>
                  <button onClick={() => setGhHistorico(null)} style={{background:'#e9ecef',border:'none',padding:'6px 14px',borderRadius:'5px',cursor:'pointer'}}>✕ Fechar</button>
                </div>
                <table className="table">
                  <thead><tr><th>Data / Hora</th><th>Mensagem do Salvamento</th></tr></thead>
                  <tbody>
                    {ghHistorico.commits.map(c => (
                      <tr key={c.sha}>
                        <td style={{whiteSpace:'nowrap'}}>{new Date(c.commit.author.date).toLocaleString('pt-BR')}</td>
                        <td>{c.commit.message}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {activeTab === 'indices' && (
          <div className="tab-content active">
            <div className="section">
              <h2>Taxas ANS por Ano</h2>
              <table className="table">
                <thead>
                  <tr><th>Ano</th><th>Taxa ANS (%)</th></tr>
                </thead>
                <tbody>
                  {Object.entries(ANS_ANO).map(([ano, taxa]) => (
                    <tr key={ano}><td>{ano}</td><td className="text-right">{(taxa * 100).toFixed(2)}%</td></tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="section">
              <h2>Índices Acumulados (Dezembro)</h2>
              <table className="table">
                <thead>
                  <tr><th>Ano-Mês</th><th>IPCA</th><th>INPC</th><th>FIPE</th><th>SELIC</th></tr>
                </thead>
                <tbody>
                  {Object.entries(INDICES).filter(([key]) => key.endsWith('-12')).map(([mes, dados]) => (
                    <tr key={mes}><td>{mes}</td><td className="text-right">{dados.ca.toFixed(6)}</td><td className="text-right">{dados.ia.toFixed(6)}</td><td className="text-right">{dados.fa.toFixed(6)}</td><td className="text-right">{dados.sa.toFixed(6)}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CalculadoraSaude />);
  </script>
</body>
</html>
